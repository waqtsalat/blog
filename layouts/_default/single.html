{{ define "main" }}
<article class="post">
  <h1>{{ .Title }}</h1>
  <div class="meta">
    <time>{{ .Date | time.Format ":date_long" }}</time>
  </div>
  <div class="content">{{ .Content }}</div>
</article>
{{ end }}

{{ define "jsonld" }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BlogPosting",
  "headline": "{{ .Title }}",
  "datePublished": "{{ .Date.Format "2006-01-02" }}",
  "dateModified": "{{ .Lastmod.Format "2006-01-02" }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}",
  "inLanguage": "{{ .Site.Language.Lang }}",
  "author": {
    "@type": "Organization",
    "name": "WaqtSalat"
  },
  "publisher": {
    "@type": "Organization",
    "name": "WaqtSalat",
    "url": "https://waqtsalat.github.io/waqtsalat/"
  }
}
</script>
{{ end }}
