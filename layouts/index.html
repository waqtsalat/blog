{{ define "main" }}
<h1>{{ .Site.Title }}</h1>
<p>{{ .Site.Params.description }}</p>
<h2>Latest Posts</h2>
{{ range first 5 (where .Site.RegularPages "Section" "posts") }}
<article class="post-card">
  <h3><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
  <time>{{ .Date | time.Format ":date_medium" }}</time>
</article>
{{ end }}
{{ end }}
